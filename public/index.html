<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Usuarios</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">U</span>
        <div>
          <div class="brand-title">Usuarios</div>
          <div class="brand-sub">Painel de cadastro e gestao</div>
        </div>
      </div>
      <div class="status" id="status">Pronto</div>
    </header>

    <main class="layout">
      <section class="panel intro">
        <h1>Crie e organize pessoas no sistema</h1>
        <p>
          Este frontend fala direto com a API em <strong>/users</strong>. Use o formulario
          para cadastrar e edite rapidamente pela lista.
        </p>

        <form class="card form-card" id="createForm">
          <div class="field">
            <label for="nome">Nome</label>
            <input id="nome" name="nome" type="text" placeholder="Ex: Ana Beatriz" required />
          </div>
          <button class="btn primary" type="submit">Cadastrar</button>
        </form>

        <div class="stats">
          <div class="stat">
            <div class="stat-label">Total</div>
            <div class="stat-value" id="totalUsers">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Ultima atualizacao</div>
            <div class="stat-value" id="lastUpdate">--:--</div>
          </div>
        </div>
      </section>

      <section class="panel list">
        <div class="list-head">
          <h2>Lista de usuarios</h2>
          <button class="btn ghost" id="refreshBtn">Atualizar</button>
        </div>
        <div class="user-list" id="userList"></div>
        <div class="empty" id="emptyState">Nenhum usuario cadastrado ainda.</div>
      </section>
    </main>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
